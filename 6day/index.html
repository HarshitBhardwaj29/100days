<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 6px;
            border: none;
            outline: none;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #result {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .card img {
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .card h2 {
            margin: 10px 0;
        }

        .card p {
            margin: 5px 0;
            color: #cbd5f5;
        }
    </style>
</head>

<body>

    <h1>GitHub Finder</h1>

    <input id="user" type="text" placeholder="Enter GitHub username">
    <button id="submit">Search</button>

    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
